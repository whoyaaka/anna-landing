<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff4fa">
  <meta name="description" content="Anna Cooper — all my links in one place.">
  <title>Anna Cooper</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="profile-card" aria-labelledby="profile-name">
      <div class="hero-wrap">
        <img class="hero" src="assets/images/hero.webp" alt="Anna Cooper" width="900" height="900">
      </div>

      <div class="identity">
        <div class="name-row">
          <h1 id="profile-name">Anna</h1>
          <span class="verified" aria-label="Verified">
            <i class="fa-solid fa-check" aria-hidden="true"></i>
          </span>
        </div>
        <p class="handle">@AnnaCo</p>
        <p class="bio">me &lt;3</p>
      </div>

      <nav class="socials" aria-label="Social links">
        <a class="social instagram" href="https://www.instagram.com/annacooper.usa/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <i class="fa-brands fa-instagram" aria-hidden="true"></i>
        </a>
        <a class="social tiktok" href="https://www.tiktok.com/@ianna.cooper" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
          <i class="fa-brands fa-tiktok" aria-hidden="true"></i>
        </a>
        <a class="social snapchat" href="https://www.snapchat.com/add/anna_c20263343" target="_blank" rel="noopener noreferrer" aria-label="Snapchat">
          <i class="fa-brands fa-snapchat" aria-hidden="true"></i>
        </a>
        <a class="social telegram" href="https://t.me/anncooperr" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
          <i class="fa-brands fa-telegram" aria-hidden="true"></i>
        </a>
      </nav>

      <a class="explore-button" href="exclusive.html" target="_blank" rel="noopener">
        <span>Explore more of me</span>
        <i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i>
      </a>

      <div class="gallery" aria-label="Photo gallery">
        <img src="assets/images/photo-1.webp" alt="Anna in a car" width="900" height="1200" loading="lazy">
        <img src="assets/images/photo-2.webp" alt="Portrait of Anna" width="900" height="1200" loading="lazy">
        <img src="assets/images/photo-3.webp" alt="Anna in a white dress" width="900" height="1200" loading="lazy">
      </div>
    </section>
  </main>
</body>
</html>
